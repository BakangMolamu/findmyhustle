<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Notes - StudySmart AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg,#12002b,#1b1f5c); color:#fff; }
header { display: flex; justify-content: space-between; align-items: center; padding:16px 20px; }
header h1 { font-size:20px; font-weight:700; }
nav a { color:#fff; margin-left:14px; text-decoration:none; font-weight:500; }
.container { padding:40px 20px; max-width:800px; margin:auto; text-align:center; }
h2 { font-size:28px; margin-bottom:10px; background: linear-gradient(90deg,#a855f7,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
p { opacity:0.85; }
textarea { width:100%; height:200px; margin-top:20px; padding:15px; border-radius:12px; border:none; outline:none; font-family:'Poppins',sans-serif; font-size:14px; }
button { margin-top:20px; padding:14px 20px; border:none; border-radius:12px; font-weight:600; background:linear-gradient(90deg,#3b82f6,#22c55e); color:#fff; cursor:pointer; }
button:hover { opacity:0.9; }
</style>
</head>
<body>
<header>
  <h1>StudySmart AI</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="quiz.html">Quiz</a>
  </nav>
</header>
<div class="container">
  <h2>Paste Your Notes</h2>
  <p>Paste your study notes below and generate a smart quiz instantly.</p>
  <textarea id="notes" placeholder="Paste your notes here..."></textarea>
  <button onclick="generateQuiz()">Generate Quiz</button>
  <p id="status"></p>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwLzWnxuKPgJkfmCS-FAQshWmc7wT6Q1VOeNJopQ5lLks7wJ45TkxpmwPvSmHcJLddBZg/exec';

async function generateQuiz() {
  const notes = document.getElementById('notes').value.trim();
  const statusEl = document.getElementById('status');

  if (!notes) {
    alert('Please paste your notes first.');
    return;
  }

  statusEl.innerText = 'Generating quiz, please wait...';

  try {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      contentType: 'application/json',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes })
    });

    const data = await response.json();

    if (data.error) {
      statusEl.innerText = 'Error generating quiz: ' + data.error;
      return;
    }

    // Save notes and quiz to localStorage
    localStorage.setItem('studentNotes', notes);
    localStorage.setItem('aiQuiz', JSON.stringify(data));

    // Redirect to quiz page
    window.location.href = 'quiz.html';
  } catch (err) {
    statusEl.innerText = 'Error connecting to AI. Try again.';
    console.error(err);
  }
}
</script>
</body>
</html>
