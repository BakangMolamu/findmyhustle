<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - StudySmart AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #12002b, #1b1f5c);
  color: #fff;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
}
header h1 { font-size: 20px; font-weight: 700; }
nav a {
  color: #fff;
  margin-left: 14px;
  text-decoration: none;
  font-weight: 500;
}
.container {
  padding: 30px 20px;
  max-width: 800px;
  margin: auto;
}
h2 {
  text-align: center;
  background: linear-gradient(90deg, #a855f7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.question {
  margin-top: 25px;
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
}
.options label {
  display: block;
  margin: 8px 0;
}
textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}
button {
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  background: linear-gradient(90deg, #3b82f6, #22c55e);
  color: #fff;
  cursor: pointer;
}
.result {
  margin-top: 20px;
  font-weight: bold;
}
.notes-box {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 14px;
  max-height: 150px;
  overflow-y: auto;
}
</style>
</head>
<body>
<header>
  <h1>StudySmart AI</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="upload.html">Upload</a>
  </nav>
</header>

<div class="container">
  <h2>Your Quiz</h2>

  <div class="notes-box" id="studentNotes"></div>

  <div class="question" id="mcqQuestion">
    <p><strong>Q1:</strong> (MCQ from notes will appear here)</p>
    <div class="options" id="mcqOptions"></div>
  </div>

  <div class="question">
    <p><strong>Q2:</strong> Write a short definition / explanation from your notes:</p>
    <textarea id="shortAnswer" placeholder="Type your answer here..."></textarea>
  </div>

  <button onclick="checkAnswers()">Submit Answers</button>

  <div class="result" id="result"></div>
</div>

<script>
// Load notes from localStorage
const notes = localStorage.getItem('studentNotes') || '';
document.getElementById('studentNotes').innerText = notes || 'No notes found. Please go back and paste your notes.';

// Simple dynamic MCQ generation (for now picks first sentence as question)
let mcqQuestionText = 'What is the main topic of your notes?';
let mcqOptions = ['Option A', 'Option B', 'Option C']; // placeholders

if (notes) {
  const firstSentence = notes.split('. ')[0];
  if(firstSentence) {
    mcqQuestionText = `What does this describe: "${firstSentence.trim()}"?`;
    mcqOptions = [`${firstSentence.split(' ')[0]} answer`, 'Option B', 'Option C'];
  }
}

document.querySelector('#mcqQuestion p').innerText = mcqQuestionText;
const optionsContainer = document.getElementById('mcqOptions');
optionsContainer.innerHTML = '';
mcqOptions.forEach((opt, i) => {
  const label = document.createElement('label');
  label.innerHTML = `<input type='radio' name='q1' value='${i}'> ${opt}`;
  optionsContainer.appendChild(label);
});

function checkAnswers() {
  let score = 0;

  // Check MCQ (we just assume first option is correct for now)
  const q1 = document.querySelector('input[name="q1"]:checked');
  if (q1 && q1.value === '0') score++;

  // Short answer basic check
  const shortAnswer = document.getElementById('shortAnswer').value.toLowerCase();
  if (notes && shortAnswer && notes.toLowerCase().includes(shortAnswer.trim())) {
    score++;
  }

  document.getElementById('result').innerText = `Your Score: ${score}/2`;
}
</script>
</body>
</html>
